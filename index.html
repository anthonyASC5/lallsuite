<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LALL SUITE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --panel: rgba(255, 255, 255, 0.08);
      --stroke: rgba(255, 255, 255, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(44, 44, 52, 0.32), transparent 26%),
        linear-gradient(180deg, #040404 0%, #000000 100%);
      color: var(--ink);
      font-family: "Orbitron", sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.03) 0,
          rgba(255, 255, 255, 0.03) 1px,
          transparent 1px,
          transparent 52px
        );
      pointer-events: none;
      opacity: 0.18;
    }

    #app {
      position: relative;
      min-height: 100vh;
    }

    .hero {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: min(960px, calc(100% - 32px));
      text-align: center;
      z-index: 3;
      pointer-events: none;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.8rem, 8vw, 5.6rem);
      line-height: 0.95;
      letter-spacing: 0.18em;
      font-weight: 900;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 0 24px rgba(255, 255, 255, 0.08);
    }

    .hero h2 {
      margin: 10px 0 8px;
      font-size: clamp(0.95rem, 2vw, 1.3rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ffffff;
      font-weight: 700;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-family: sans-serif;
      line-height: 1.65;
    }

    .hero .sub {
      margin-top: 6px;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #scene-root {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }

    .tooltip {
      position: absolute;
      min-width: 220px;
      max-width: 320px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(8, 8, 10, 0.92);
      border: 1px solid var(--stroke);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
      color: #f5f5f5;
      font-family: sans-serif;
      font-size: 0.84rem;
      line-height: 1.45;
      opacity: 0;
      transform: translate(-50%, -16px);
      transition: opacity 0.16s ease, transform 0.16s ease;
      backdrop-filter: blur(8px);
    }

    .tooltip.visible {
      opacity: 1;
      transform: translate(-50%, -22px);
    }

    .tooltip strong {
      display: block;
      margin-bottom: 6px;
      font-family: "Orbitron", sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ffffff;
      font-size: 0.78rem;
    }

    .footer-note {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--stroke);
      color: var(--muted);
      font-family: sans-serif;
      font-size: 0.8rem;
      z-index: 3;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .people-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
      z-index: 5;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(10, 12, 16, 0.62);
      border: 1px solid var(--stroke);
      color: #ffffff;
      font-family: sans-serif;
      font-size: 0.8rem;
      backdrop-filter: blur(10px);
      pointer-events: auto;
      cursor: pointer;
      user-select: none;
    }

    .people-toggle input {
      appearance: none;
      width: 42px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.2);
      position: relative;
      margin: 0;
      cursor: pointer;
      transition: background 0.18s ease;
    }

    .people-toggle input::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      transition: transform 0.18s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .people-toggle input:checked {
      background: rgba(114, 232, 162, 0.68);
    }

    .people-toggle input:checked::before {
      transform: translateX(18px);
    }

    @media (max-width: 720px) {
      .hero {
        top: 20px;
      }

      .people-toggle {
        top: auto;
        right: 14px;
        bottom: 78px;
      }

      .footer-note {
        width: calc(100% - 28px);
        white-space: normal;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <section class="hero" aria-label="Page introduction">
      <h1>LALL SUITE</h1>
      <h2>Creative Tools by Anthony Lall</h2>
      <p>Experimental media engines and visual playgrounds</p>
      <p class="sub">Online video, audio, and depth engines</p>
    </section>

    <div id="scene-root" aria-label="Interactive 3D pedalboard"></div>

    <div class="hud">
      <div class="tooltip" id="tooltip" role="status" aria-live="polite"></div>
    </div>

    <label class="people-toggle" for="people-toggle">
      <span>People</span>
      <input id="people-toggle" type="checkbox" checked>
    </label>

    <div class="footer-note">Hover pedals or the studio computer. Click to launch or boot.</div>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LALL SUITE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --board: linear-gradient(180deg, #fefefe 0%, #f2f2f2 100%);
      --ink: #111111;
      --muted: #6e6e73;
      --chrome: #e8e8ea;
      --shadow: rgba(0, 0, 0, 0.16);
      --deep-shadow: rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Orbitron", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.96) 0%, rgba(244, 244, 244, 0.95) 40%, rgba(234, 234, 234, 1) 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.5), transparent 35%),
        repeating-linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.018) 0,
          rgba(0, 0, 0, 0.018) 1px,
          transparent 1px,
          transparent 42px
        );
      pointer-events: none;
    }

    main {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 56px 0 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 34px;
    }

    .hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 760px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.8rem, 8vw, 5.6rem);
      line-height: 0.95;
      letter-spacing: 0.18em;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(0.95rem, 2vw, 1.3rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #222;
      font-weight: 700;
    }

    .hero p {
      margin: 0;
      font-family: sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .hero .sub {
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .board-shell {
      width: min(100%, 980px);
      padding: 34px;
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(238, 238, 238, 0.92)),
        var(--board);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.12),
        inset 0 2px 0 rgba(255, 255, 255, 0.85),
        inset 0 -8px 18px rgba(0, 0, 0, 0.08);
      position: relative;
      overflow: hidden;
    }

    .board-shell::before,
    .board-shell::after {
      content: "";
      position: absolute;
      left: 26px;
      right: 26px;
      height: 16px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.1), rgba(255, 255, 255, 0.35));
      box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.7);
    }

    .board-shell::before {
      top: 24px;
    }

    .board-shell::after {
      bottom: 24px;
    }

    .pedalboard {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      justify-items: center;
      align-items: start;
      max-width: 900px;
      margin: 0 auto;
      padding: 36px 10px;
      perspective: 1200px;
    }

    .pedal {
      --pedal-color: #d9d9d9;
      width: 200px;
      height: 260px;
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.08) 28%, rgba(0, 0, 0, 0.06) 100%),
        linear-gradient(160deg, color-mix(in srgb, var(--pedal-color) 88%, white 12%), color-mix(in srgb, var(--pedal-color) 72%, black 28%));
      box-shadow:
        0 10px 30px var(--shadow),
        0 18px 24px rgba(0, 0, 0, 0.08),
        inset 0 2px 1px rgba(255, 255, 255, 0.75),
        inset 0 -8px 20px rgba(0, 0, 0, 0.18);
      transform: rotateX(8deg) translateY(0);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      position: relative;
      padding: 18px 18px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      isolation: isolate;
      font: inherit;
      color: inherit;
      text-align: left;
    }

    .pedal::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.22), transparent 34%, rgba(255, 255, 255, 0.08) 100%);
      opacity: 0.9;
      z-index: -1;
    }

    .pedal::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 14px;
      background: radial-gradient(circle at center, color-mix(in srgb, var(--pedal-color) 30%, transparent), transparent 65%);
      opacity: 0;
      filter: blur(18px);
      transition: opacity 0.2s ease;
      z-index: -2;
    }

    .pedal:hover,
    .pedal:focus-visible,
    .pedal.active {
      transform: rotateX(8deg) translateY(-8px);
      box-shadow:
        0 20px 50px var(--deep-shadow),
        0 0 30px color-mix(in srgb, var(--pedal-color) 35%, white 65%),
        inset 0 2px 1px rgba(255, 255, 255, 0.75),
        inset 0 -8px 20px rgba(0, 0, 0, 0.18);
      filter: saturate(1.08);
    }

    .pedal:hover::after,
    .pedal:focus-visible::after,
    .pedal.active::after {
      opacity: 1;
    }

    .pedal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .brand {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(17, 17, 17, 0.82);
      max-width: 110px;
    }

    .led {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.25);
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .led.on {
      background: color-mix(in srgb, var(--pedal-color) 88%, white 12%);
      box-shadow:
        0 0 10px color-mix(in srgb, var(--pedal-color) 78%, white 22%),
        0 0 24px color-mix(in srgb, var(--pedal-color) 48%, white 52%),
        inset 0 0 3px rgba(255, 255, 255, 0.75);
      animation: pulse 2s infinite ease-in-out;
      transform: scale(1.05);
    }

    .display-wrap {
      position: relative;
      margin-top: 8px;
    }

    .tooltip {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 16px);
      transform: translateX(-50%) translateY(6px);
      width: 220px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(9, 9, 11, 0.93);
      color: #f4f4f5;
      font-family: sans-serif;
      font-size: 0.83rem;
      line-height: 1.45;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 5;
    }

    .tooltip::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: rgba(9, 9, 11, 0.93);
    }

    .pedal:hover .tooltip,
    .pedal:focus-visible .tooltip,
    .pedal.active .tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .display {
      height: 64px;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.42);
      background:
        linear-gradient(180deg, rgba(19, 24, 27, 0.92), rgba(11, 14, 17, 1)),
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02) 0,
          rgba(255, 255, 255, 0.02) 2px,
          transparent 2px,
          transparent 4px
        );
      box-shadow:
        inset 0 0 18px rgba(0, 0, 0, 0.78),
        0 5px 10px rgba(0, 0, 0, 0.14);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 8px;
    }

    .display-text {
      font-family: "Press Start 2P", monospace;
      font-size: 0.52rem;
      line-height: 1.55;
      color: #95f6ff;
      text-shadow: 0 0 8px rgba(110, 242, 255, 0.8);
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .pedal.active .display-text {
      color: #fff7af;
      text-shadow: 0 0 12px rgba(255, 224, 116, 0.88);
    }

    .pedal-name {
      text-align: center;
      margin: 18px 0 10px;
      font-size: 1rem;
      line-height: 1.2;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .footswitch {
      width: 82px;
      height: 82px;
      margin: 0 auto;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.52);
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.85), rgba(220, 220, 220, 0.2) 30%, rgba(120, 120, 120, 0.25) 60%, rgba(20, 20, 20, 0.38) 100%),
        linear-gradient(180deg, #fbfbfb, #a5a5a5);
      box-shadow:
        inset 0 3px 4px rgba(255, 255, 255, 0.82),
        inset 0 -8px 10px rgba(0, 0, 0, 0.22),
        0 6px 16px rgba(0, 0, 0, 0.22);
    }

    .status {
      text-align: center;
      font-family: sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(17, 17, 17, 0.7);
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.8;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.08);
      }
    }

    @keyframes bootFlash {
      0%, 100% {
        opacity: 0.2;
      }
      50% {
        opacity: 1;
      }
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 24px, 980px);
        padding-top: 36px;
      }

      .board-shell {
        padding: 28px 20px;
      }

      .pedalboard {
        grid-template-columns: repeat(2, 1fr);
        gap: 28px;
      }
    }

    @media (max-width: 560px) {
      .hero h1 {
        letter-spacing: 0.12em;
      }

      .pedalboard {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .pedal {
        width: min(100%, 240px);
      }

      .tooltip {
        width: 200px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-label="Page introduction">
      <h1>LALL SUITE</h1>
      <h2>Creative Tools by Anthony Lall</h2>
      <p>Experimental media engines and visual playgrounds</p>
      <p class="sub">Online video, audio, and depth engines</p>
    </section>

    <section class="board-shell" aria-label="Interactive pedalboard">
      <div class="pedalboard" id="pedalboard"></div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
